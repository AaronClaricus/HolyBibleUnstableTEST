<!DOCTYPE html>
<html>
	<head>

	<meta charset="UTF-8">
		<link rel="stylesheet" href="./css4.css">
		<style>
			
					html,
		body{
			margin:0;
			padding:0;
			width:100%;
			height:100%;
			font-family:monospace;
			white-space:normal;
			overflow-wrap:break-word;
			word-break:break-word;
			line-height:1.4;
			background:#222222;
			color:#E0E0E0;
			box-sizing:border-box;
		}
		body > *:first-child{
			margin-top:0;
			margin-top:0;
		}
		#content{
			white-space:pre-wrap;
			overflow-wrap:break-word;
			word-break:break-word;
			margin:0;
			padding:12px;
			overflow-y: auto;
		}
		::selection {
			background: __HIGHLIGHT_BG__;
			color: __HIGHLIGHT_TEXT__;
		}
		html, body {
			font-size:__FONT_SIZE__;
		}
		</style>
	</head>
<body><div id="content">__CONTENT__</div></body>
</html>
